<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso — Eureqa3D</title>
  <link rel="icon" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/assets/styles.css" />
  <style>
    body { min-height:100vh; display:grid; place-items:center;
           background: linear-gradient(135deg, var(--teal-dark), var(--teal-700)); padding:1.5rem; }
    .login { width:100%; max-width:400px; background:#fff; border-radius:18px; padding:2.4rem; box-shadow:0 24px 60px rgba(0,0,0,.25); }
    .login img { height:42px; margin-bottom:1.4rem; }
    .login h1 { font-size:1.5rem; }
    .login form { display:flex; flex-direction:column; gap:1rem; margin-top:1.4rem; }
    .login label { font-family:var(--head); font-weight:600; font-size:.9rem; display:flex; flex-direction:column; gap:.35rem; }
    .login input { padding:.75rem .9rem; border:1px solid var(--line); border-radius:10px; font:inherit; }
    .login input:focus { outline:2px solid var(--teal); border-color:var(--teal); }
    .login .btn { justify-content:center; }
    .login .err { background:#fdecea; color:#b3261e; padding:.7rem .9rem; border-radius:10px; font-size:.9rem; margin:0; }
  </style>
</head>
<body>
  <div class="login">
    <img src="/assets/img/logo.svg" alt="Eureqa3D" />
    <h1>Zona privada</h1>
    <p class="muted">Accede para gestionar el contenido del portal.</p>
    <form id="login-form">
      <label>Email
        <input type="email" name="email" autocomplete="username" required />
      </label>
      <label>Contraseña
        <input type="password" name="password" autocomplete="current-password" required />
      </label>
      <p id="error" class="err" hidden></p>
      <button class="btn btn-primary" type="submit">Entrar</button>
    </form>
  </div>
  <script src="/assets/login.js"></script>
</body>
</html>
