<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto — Eureqa3D</title>
  <meta name="description" content="Contacta con Eureqa3D. ¿Quieres hacer un caso de prueba? Llámanos o escríbenos." />
  <link rel="icon" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body data-page="contacto">
  <div id="site-header"></div>

  <section class="subhero">
    <div class="container">
      <span class="eyebrow">Contacto</span>
      <h1>¿Quieres hacer un caso de prueba?</h1>
      <p>Cuéntanos tu caso y te responderemos lo antes posible.</p>
    </div>
  </section>

  <section>
    <div class="container contact-grid">
      <form class="contact" id="contact-form">
        <div class="form-msg" hidden></div>
        <label>Nombre
          <input type="text" name="name" required />
        </label>
        <label>Correo electrónico
          <input type="email" name="email" required />
        </label>
        <label>Asunto
          <input type="text" name="subject" />
        </label>
        <label>Mensaje
          <textarea name="body" required></textarea>
        </label>
        <button class="btn btn-primary" type="submit">Enviar mensaje</button>
      </form>

      <div class="contact-info">
        <h3>Llámanos</h3>
        <ul>
          <li><span class="ic">📞</span><a href="tel:+34927180032">927 180 032</a></li>
          <li><span class="ic">📱</span><a href="tel:+34654552044">654 552 044</a></li>
          <li><span class="ic">✉️</span><a href="mailto:info@eureqa3d.com">info@eureqa3d.com</a></li>
          <li><span class="ic">🐦</span><a href="https://twitter.com/eureqa3D" target="_blank" rel="noopener">@eureqa3D</a></li>
          <li><span class="ic">📍</span><span>Extremadura · España</span></li>
        </ul>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="/assets/site.js"></script>
</body>
</html>
