<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel — Eureqa3D</title>
  <link rel="icon" href="/assets/favicon.svg" />
  <link rel="stylesheet" href="/assets/styles.css" />
  <link rel="stylesheet" href="/assets/admin.css" />
</head>
<body>
  <div class="admin">
    <aside class="sidebar">
      <a class="brand" href="/"><img src="/assets/img/logo.svg" alt="Eureqa3D" /></a>
      <nav id="sidebar-nav">
        <!-- rendered by JS based on role -->
      </nav>
      <div class="sidebar-foot">
        <span id="who" class="muted"></span>
        <span id="role-badge" class="role-badge"></span>
        <a href="/" target="_blank">Ver web ↗</a>
        <button id="logout" class="link">Cerrar sesión</button>
      </div>
    </aside>

    <main class="content">
      <!-- Generic list view (news / events / messages) -->
      <div id="list-view">
        <header class="content-head">
          <h1 id="view-title"></h1>
          <button class="btn btn-primary" id="new-btn">+ Nuevo</button>
        </header>
        <div id="list"></div>
      </div>

      <!-- Kanban view -->
      <div id="kanban-view" hidden>
        <header class="content-head">
          <h1>Backlog EureqaVisor3D</h1>
          <button class="btn btn-primary" id="kanban-new-btn">+ Nueva tarjeta</button>
        </header>
        <div class="kanban-filters" id="kanban-filters">
          <input type="search" id="kf-search" placeholder="Buscar…" />
          <select id="kf-area"><option value="">Todas las áreas</option></select>
          <select id="kf-prioridad">
            <option value="">Prioridad</option>
            <option value="Alta">Alta</option>
            <option value="Media">Media</option>
            <option value="Baja">Baja</option>
          </select>
          <select id="kf-creador"><option value="">Creador</option></select>
          <button class="btn btn-ghost btn-sm" id="kf-clear">Limpiar</button>
        </div>
        <div class="kanban-board" id="kanban-board">
          <!-- columns rendered by JS -->
        </div>
      </div>

      <!-- Licitaciones view -->
      <div id="licitaciones-view" hidden>
        <header class="content-head">
          <h1>Licitaciones — Funnel comercial</h1>
        </header>
        <div class="kanban-filters" id="licitaciones-filters">
          <input type="search" id="lf-search" placeholder="Buscar por órgano u objeto…" />
          <select id="lf-encaje">
            <option value="">Encaje</option>
            <option value="alto">Alto</option>
            <option value="medio">Medio</option>
          </select>
          <select id="lf-responsable"><option value="">Responsable</option></select>
          <select id="lf-pais"><option value="">País</option></select>
          <button class="btn btn-ghost btn-sm" id="lf-clear">Limpiar</button>
        </div>
        <div class="kanban-board" id="licitaciones-board">
          <!-- columns rendered by JS -->
        </div>
      </div>

      <!-- Users view -->
      <div id="users-view" hidden>
        <header class="content-head">
          <h1>Usuarios</h1>
          <div style="display:flex;gap:.6rem">
            <button class="btn btn-ghost btn-sm" id="invite-tab-btn">Invitados</button>
            <button class="btn btn-primary" id="user-new-btn">+ Nuevo usuario</button>
          </div>
        </header>
        <div id="users-list"></div>
        <!-- Invites sub-panel -->
        <div id="invites-panel" hidden>
          <h2 style="margin:2rem 0 1rem;font-size:1.1rem">Invitaciones temporales</h2>
          <button class="btn btn-teal btn-sm" id="invite-new-btn" style="margin-bottom:1rem">+ Nueva invitación</button>
          <div id="invites-list"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal genérico (noticias / eventos / usuarios / nueva tarjeta) -->
  <div class="modal" id="modal" hidden>
    <div class="modal-card">
      <header><h2 id="modal-title">Editar</h2><button class="link" id="modal-close">✕</button></header>
      <form id="editor"></form>
      <p class="form-msg err" id="modal-error" hidden></p>
      <footer>
        <button class="btn btn-ghost" id="cancel">Cancelar</button>
        <button class="btn btn-primary" id="save">Guardar</button>
      </footer>
    </div>
  </div>

  <!-- Modal detalle de tarjeta kanban -->
  <div class="modal" id="card-modal" hidden>
    <div class="modal-card modal-card--wide">
      <header>
        <div style="display:flex;align-items:center;gap:.8rem">
          <span id="cm-id-badge" class="id-badge"></span>
          <h2 id="cm-title" style="margin:0"></h2>
        </div>
        <button class="link" id="card-modal-close">✕</button>
      </header>
      <div id="card-detail" style="padding:1.2rem 1.5rem;overflow-y:auto;flex:1"></div>
      <footer>
        <button class="btn btn-ghost" id="card-edit-btn">Editar</button>
        <button class="btn btn-ghost" id="card-modal-cancel">Cerrar</button>
      </footer>
    </div>
  </div>

  <script src="/assets/admin.js"></script>
</body>
</html>
